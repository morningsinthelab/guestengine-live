server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Profile pages: /profile/{slug} → /profile/index.html
    # The JS reads the slug from the URL path
    location ~ ^/profile/([a-zA-Z0-9_-]+)/?$ {
        try_files /profile/index.html =404;
    }

    # Digital Twin URLs are RETIRED. The Digital Twin is a *feature* of the
    # Authority Page (twin portrait, twin status, IP/consent layer) — not a
    # parallel URL. Permanent 301 to /profile/{slug} so any links already
    # in the wild keep working. Was: try_files /twin/index.html =404.
    location ~ ^/twin/([a-zA-Z0-9_-]+)/?$ {
        return 301 /profile/$1;
    }

    # Default: try the exact file, then directory, then 404
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Cache static assets (short cache for images, allow revalidation)
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }
}
