server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Profile pages: /profile/{slug} → /profile/index.html
    # The JS reads the slug from the URL path
    location ~ ^/profile/([a-zA-Z0-9_-]+)/?$ {
        try_files /profile/index.html =404;
    }

    # Digital Twin pages (Gap 3): /twin/{slug} → /twin/index.html
    # Public-facing twin surface that renders the On The Record portrait,
    # Authority signal, signature pull-quotes, and topics. Gates on
    # twinPortraitUrl — if absent, the JS redirects to /profile/{slug}.
    location ~ ^/twin/([a-zA-Z0-9_-]+)/?$ {
        try_files /twin/index.html =404;
    }

    # Default: try the exact file, then directory, then 404
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Cache static assets (short cache for images, allow revalidation)
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }
}
